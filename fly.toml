app = "ot-job-tracker"
primary_region = "nrt"

[build]

[env]
  DB_PATH = "/data/jobs.db"
  CRAWL_INTERVAL_MINUTES = "30"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "ot_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
