<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1d24">
<title>설정 · OT 채용 트래커</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#1a1d24;
  --surface:#222630;
  --surface-alt:#2a2f3a;
  --line:#353a47;
  --line-strong:#444a59;
  --ink:#e8ebf0;
  --ink-soft:#b9c0cc;
  --muted:#7d8593;
  --accent:#a8e6cf;
  --accent-soft:rgba(168,230,207,.10);
  --bl:#a9c7f5;
  --font:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}

.wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;margin-bottom:22px;border-bottom:1px solid var(--line)}
.title{font-size:20px;font-weight:800;letter-spacing:-0.02em;color:var(--ink)}
.title small{display:block;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.02em;margin-top:2px}

.btn{font-size:12px;font-weight:700;padding:8px 13px;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;text-decoration:none;display:inline-block;line-height:1.2;font-family:inherit;transition:.15s}
.btn:hover{border-color:var(--line-strong);color:var(--ink);background:var(--surface-alt)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1d24}
.btn.primary:hover{background:#bff0dc;border-color:#bff0dc;color:#1a1d24}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.panel h2{font-size:15px;font-weight:700;margin-bottom:6px;letter-spacing:-0.01em}
.desc{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;line-height:1.6}
.desc b{color:var(--ink);font-weight:600}

.field{margin-top:18px}
.field:first-of-type{margin-top:0}
label{display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:0.01em}
label .hint{font-weight:400;color:var(--muted);margin-left:6px;font-size:11px}
textarea{
  width:100%;min-height:80px;
  background:var(--surface-alt);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px;color:var(--ink);font-family:var(--font);font-size:13px;line-height:1.5;resize:vertical;
}
textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea::placeholder{color:var(--muted)}

.default-block{margin-top:8px;background:var(--bg);border-radius:8px;border:1px solid var(--line);overflow:hidden}
.default-block>summary{list-style:none;padding:8px 12px;font-size:11px;color:var(--muted);letter-spacing:0.02em;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.default-block>summary::-webkit-details-marker{display:none}
.default-block>summary::after{content:"펼치기";font-size:10px;color:var(--muted);border:1px solid var(--line);padding:2px 7px;border-radius:4px}
.default-block[open]>summary::after{content:"접기"}
.default-block[open]>summary{border-bottom:1px solid var(--line)}
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface-alt);color:var(--ink-soft);border:1px solid var(--line)}

.actions{margin-top:24px;padding-top:16px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}

@media (max-width:480px){
  .wrap{padding:14px 12px 40px}
  .panel{padding:16px}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <div class="title">내 설정<small>알림 키워드와 지역</small></div>
    <a class="btn" href="/">대시보드</a>
  </header>

  <form method="POST" class="panel">
    <h2>맞춤 키워드 · 지역</h2>
    <p class="desc">
      기본 키워드/지역에 <b>내가 추가한 항목</b>을 더해 필터링합니다.
      수집 결과는 모든 사용자가 함께 보고, 카카오톡 알림은 내 설정에 맞는 공고만 전송됩니다.
    </p>

    <div class="field">
      <label>추가 키워드 <span class="hint">콤마 또는 줄바꿈으로 구분</span></label>
      <textarea name="keywords" placeholder="예: 방문재활, 소아작업치료, 노인복지관">{{ keywords }}</textarea>
      <details class="default-block">
        <summary>기본 키워드 {{ default_keywords|length }}개</summary>
        <div class="chips">{% for k in default_keywords %}<span class="chip">{{ k }}</span>{% endfor %}</div>
      </details>
    </div>

    <div class="field">
      <label>추가 지역 <span class="hint">콤마 또는 줄바꿈으로 구분</span></label>
      <textarea name="regions" placeholder="예: 경기, 인천, 성남">{{ regions }}</textarea>
      <details class="default-block">
        <summary>기본 지역 {{ default_regions|length }}개</summary>
        <div class="chips">{% for r in default_regions %}<span class="chip">{{ r }}</span>{% endfor %}</div>
      </details>
    </div>

    <div class="actions">
      <a class="btn" href="/">취소</a>
      <button class="btn primary" type="submit">저장</button>
    </div>
  </form>
</div>
</body>
</html>
