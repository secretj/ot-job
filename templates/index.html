<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1d24">
<title>OT 채용 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  /* 파스텔 다크: 차분한 회청색 베이스 + 부드러운 액센트 */
  --bg:#1a1d24;
  --surface:#222630;
  --surface-alt:#2a2f3a;
  --line:#353a47;
  --line-strong:#444a59;
  --ink:#e8ebf0;
  --ink-soft:#b9c0cc;
  --muted:#7d8593;
  --accent:#a8e6cf;        /* 파스텔 민트 */
  --accent-soft:rgba(168,230,207,.10);
  --bl:#a9c7f5;            /* 파스텔 블루 */
  --bl-soft:rgba(169,199,245,.10);
  --warn:#ffd6a5;          /* 파스텔 피치 (마감) */
  --warn-soft:rgba(255,214,165,.10);
  --new:#f7b2c6;           /* 파스텔 살몬핑크 (신규) */
  --new-soft:rgba(247,178,198,.12);
  --lav:#c9b8e8;           /* 파스텔 라벤더 */
  --lav-soft:rgba(201,184,232,.10);
  --yel:#f3e3a3;           /* 파스텔 옐로 */
  --yel-soft:rgba(243,227,163,.10);
  --font:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --radius:10px;
  --radius-sm:5px;
  --grad:linear-gradient(135deg,var(--accent),var(--bl));
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--ink)}
body{font-family:var(--font);font-feature-settings:"ss02","ss03";line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}

.wrap{max-width:780px;margin:0 auto;padding:16px 16px 80px}

/* 헤더: 한 줄 고정 - 좌측 축약 브랜드, 우측 기본 액션 + 더보기 메뉴 */
.hdr{display:flex;justify-content:space-between;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:10px;border-bottom:1px solid var(--line)}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);white-space:nowrap}
.brand-name em{font-style:normal;color:var(--accent);font-weight:600}

.actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn{font-size:12px;font-weight:700;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;line-height:1;white-space:nowrap;transition:.15s}
.btn:hover{border-color:var(--line-strong);background:var(--surface-alt);color:var(--ink)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1d24}
.btn.primary:hover{background:#bff0dc;border-color:#bff0dc;color:#1a1d24}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.icon{padding:8px 10px;font-size:15px;line-height:1;letter-spacing:2px}

/* 드롭다운 메뉴 (모바일 원핸드) */
.menu{position:relative}
.menu-panel{position:absolute;top:calc(100% + 6px);right:0;min-width:180px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:6px;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.35)}
.menu.open .menu-panel{display:block}
.menu-panel a,.menu-panel button{display:block;width:100%;text-align:left;padding:9px 12px;font-size:13px;font-weight:500;color:var(--ink);background:none;border:none;border-radius:6px;cursor:pointer;text-decoration:none}
.menu-panel a:hover,.menu-panel button:hover{background:var(--surface-alt)}
.menu-panel .who{font-size:11px;color:var(--muted);padding:6px 12px;border-bottom:1px solid var(--line);margin-bottom:4px;font-weight:400}
.menu-panel hr{border:none;border-top:1px solid var(--line);margin:4px 0}

/* 간단 요약 라인 (신규 N · 안읽음 M) */
.summary{font-size:12px;color:var(--muted);margin:0 0 14px;letter-spacing:0.01em}
.summary b{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
.summary .sep{margin:0 8px;color:var(--line-strong)}
.summary .unread{color:var(--new);font-weight:700}

/* 필터: 얇은 구분선 스타일 탭 */
.filters{display:flex;gap:2px;margin-bottom:12px;flex-wrap:nowrap;border-bottom:1px solid var(--line);padding-bottom:0;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{padding:9px 13px;font-size:12.5px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;margin-bottom:-1px;font-family:inherit}
.fbtn:hover{color:var(--ink)}
.fbtn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

.status-msg{font-size:12px;color:var(--accent);margin:4px 0 10px;min-height:16px}

/* 검색 바 */
.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.search-bar .unread-btn{flex-shrink:0;padding:9px 13px;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);cursor:pointer;white-space:nowrap;line-height:1;transition:.15s;font-family:inherit}
.search-bar .unread-btn:hover{color:var(--ink);border-color:var(--line-strong);background:var(--surface-alt)}
.search-bar .unread-btn.on{color:var(--accent);border-color:rgba(168,230,207,.4);background:var(--accent-soft);font-weight:700}
.search-bar .search-input{flex:1;min-width:0;padding:9px 12px;font-size:13px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);font-family:inherit;transition:.15s;-webkit-appearance:none;appearance:none}
.search-bar .search-input::placeholder{color:var(--muted)}
.search-bar .search-input:focus{outline:none;border-color:var(--accent);background:var(--surface-alt)}
.search-bar .search-input::-webkit-search-cancel-button{-webkit-appearance:none;appearance:none;width:14px;height:14px;background:var(--muted);-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M4 4l8 8M12 4l-8 8' stroke='black' stroke-width='2'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M4 4l8 8M12 4l-8 8' stroke='black' stroke-width='2'/></svg>") center/contain no-repeat;cursor:pointer}

/* 카드 */
.card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px 12px;margin-bottom:10px;transition:.15s}
.card:hover{border-color:var(--line-strong);background:var(--surface-alt)}
.card.is-new{border-left:3px solid var(--new);padding-left:13px}
.card.read{opacity:.55}
.card.read .card-title{color:var(--muted);font-weight:500}

.card-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;min-height:20px}
.src-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;min-width:0}
/* 출처 배지: 단일 회색 톤 (시각 노이즈 제거) */
.src{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:var(--radius-sm);background:transparent;color:var(--muted);border:1px solid var(--line);letter-spacing:0.02em}
.dup-badge{font-size:10px;color:var(--muted);padding:2px 6px;border-radius:var(--radius-sm);background:var(--surface-alt)}
.new-badge{font-size:10px;font-weight:700;color:var(--new);background:var(--new-soft);padding:2px 8px;border-radius:var(--radius-sm);letter-spacing:0.06em;border:1px solid rgba(247,178,198,.25)}

/* 읽음 토글 버튼 */
.read-toggle{font-size:11px;font-weight:600;color:var(--muted);background:transparent;border:1px solid var(--line);padding:3px 9px;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap;line-height:1.4;transition:.15s}
.read-toggle:hover{color:var(--ink);border-color:var(--line-strong);background:var(--surface-alt)}
.read-toggle.is-read{color:var(--accent);border-color:rgba(168,230,207,.25);background:var(--accent-soft)}

.card-title{font-size:15px;font-weight:700;line-height:1.4;color:var(--ink);letter-spacing:-0.01em;margin-bottom:4px}
.card-org{font-size:12.5px;color:var(--ink-soft);margin-bottom:8px}
.card-org::before{content:"";display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);vertical-align:middle;margin-right:6px;margin-bottom:2px}

.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:11px;padding:2px 8px;border-radius:var(--radius-sm);background:var(--surface-alt);color:var(--ink-soft);font-weight:500;border:1px solid var(--line)}
.tag.loc{color:var(--bl);background:var(--bl-soft);border-color:rgba(169,199,245,.2)}
.tag.tp{color:var(--accent);background:var(--accent-soft);border-color:rgba(168,230,207,.2)}
.tag.dl{color:var(--warn);background:var(--warn-soft);border-color:rgba(255,214,165,.25);font-weight:600}

.card-btm{display:flex;justify-content:space-between;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--line)}
.card-date{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.card-link{font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;padding:6px 12px;border-radius:var(--radius-sm);background:var(--accent-soft);border:1px solid rgba(168,230,207,.25)}
.card-link:hover{background:rgba(168,230,207,.18)}

/* 로그 */
.log-section{margin-top:32px;padding-top:18px;border-top:1px solid var(--line)}
.log-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.log-item{font-size:12px;color:var(--ink-soft);padding:7px 0;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;display:flex;gap:10px;align-items:baseline}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--bl);font-size:11px;min-width:78px}
.log-ok{color:var(--accent)}
.log-fail{color:var(--new)}

.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:13px;border:1px dashed var(--line);border-radius:var(--radius);background:var(--surface)}

/* 네트워크 오류 인디케이터 (피치 톤) */
.retry-box{margin:10px 0;padding:14px 16px;border:1px solid rgba(255,214,165,.28);background:var(--warn-soft);border-radius:var(--radius);color:var(--warn);font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.retry-box .retry-msg{color:var(--warn);font-weight:600}
.retry-box .retry-btn{font-size:12px;font-weight:700;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid rgba(255,214,165,.45);background:transparent;color:var(--warn);cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.retry-box .retry-btn:hover{background:rgba(255,214,165,.15);border-color:var(--warn)}
.retry-box.inline{margin-top:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .25s ease both}
.card.merge-in{animation:fadeIn .4s ease both}

@media (max-width:480px){
  .wrap{padding:12px 12px 60px}
  .brand-name{font-size:16px}
  /* 모바일: 부가 버튼은 메뉴로 숨김, 수집+메뉴만 노출 */
  .actions .btn.collapse{display:none}
}
@media (min-width:481px){
  .menu{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <div class="brand-name">OT <em>트래커</em></div>
    <div class="actions">
      <button class="btn primary" id="crawlBtn" onclick="crawlNow()">수집</button>
      {% if me %}
        <a class="btn collapse" href="/settings">설정</a>
        <button class="btn collapse" onclick="toggleSub()">알림</button>
        <a class="btn collapse" href="/logout">로그아웃</a>
      {% else %}
        <a class="btn collapse" href="/login">카카오 로그인</a>
      {% endif %}
      <div class="menu" id="menu">
        <button class="btn icon" aria-label="메뉴" aria-haspopup="true" onclick="toggleMenu(event)">⋯</button>
        <div class="menu-panel" role="menu">
          {% if me %}
            <div class="who">{{ me.nickname or me.id }}</div>
            <a href="/settings">설정</a>
            <button type="button" onclick="toggleSub()">알림 ON/OFF</button>
            <hr>
            <a href="/logout">로그아웃</a>
          {% else %}
            <a href="/login">카카오 로그인</a>
          {% endif %}
        </div>
      </div>
    </div>
  </header>

  <p class="summary" id="summary" aria-label="요약">
    신규 <b id="stNew">-</b>
    {% if me %}<span class="sep">·</span>안읽음 <span class="unread" id="stUnread">-</span>{% endif %}
    <span class="sep">·</span><span style="color:var(--muted)">전체 <span id="stTotal">-</span></span>
  </p>

  <div class="search-bar" role="search">
    {% if me %}<button type="button" class="unread-btn" id="includeReadToggle" onclick="toggleIncludeRead()" aria-pressed="false">읽은 공고도 표시</button>{% endif %}
    <input type="search" class="search-input" id="searchInput" placeholder="검색 (제목/회사/지역/고용형태)" aria-label="공고 검색" autocomplete="off" oninput="onSearchInput()">
  </div>

  <div class="status-msg" id="statusMsg" role="status" aria-live="polite"></div>
  <div id="jobList"><div class="empty">수집 버튼을 누르거나 잠시 기다려 주세요</div></div>
  <div id="loadMoreSentinel" aria-hidden="true" style="height:1px"></div>
  <div id="loadingIndicator" style="display:none;text-align:center;padding:16px;color:var(--muted);font-size:12px">불러오는 중...</div>
  <div id="retryBox" style="display:none"></div>

  <section class="log-section">
    <div class="log-title">수집 로그</div>
    <div id="logList"></div>
  </section>
</div>

<script>
const LOGGED_IN = {{ 'true' if me else 'false' }};
const PAGE_SIZE = 50;

// localStorage 마이그레이션: 기존 'unreadOnly' 키 제거 (의미 반전됨)
try { localStorage.removeItem('unreadOnly'); } catch (e) {}
// 기본: 안 읽은 공고만 (include_read=false)
let includeRead = false;
try {
  const saved = localStorage.getItem('includeRead');
  if (saved === '1') includeRead = true;
} catch (e) {}

let searchTerm = '';
let searchDebounceTimer = null;
let currentOffset = 0;
let hasMore = false;
let isLoading = false;
let loadReqSeq = 0;  // 경쟁 방지용 시퀀스

// 초기 검색어: URL ?q= 에서 복원
(function initSearchFromUrl(){
  try {
    const p = new URLSearchParams(location.search);
    const q = p.get('q');
    if (q) {
      searchTerm = q.trim();
      const input = document.getElementById('searchInput');
      if (input) input.value = searchTerm;
    }
  } catch (e) {}
})();

function syncUrl() {
  try {
    const p = new URLSearchParams(location.search);
    if (searchTerm) p.set('q', searchTerm);
    else p.delete('q');
    const qs = p.toString();
    const newUrl = location.pathname + (qs ? '?' + qs : '') + location.hash;
    history.replaceState(null, '', newUrl);
  } catch (e) {}
}

function setIncludeReadUI() {
  const el = document.getElementById('includeReadToggle');
  if (!el) return;
  el.classList.toggle('on', includeRead);
  el.setAttribute('aria-pressed', includeRead ? 'true' : 'false');
}

function toggleIncludeRead() {
  includeRead = !includeRead;
  try { localStorage.setItem('includeRead', includeRead ? '1' : '0'); } catch (e) {}
  setIncludeReadUI();
  resetAndLoad();
}

function buildJobsUrl(offset) {
  const params = new URLSearchParams();
  if (includeRead) params.set('include_read', '1');
  if (searchTerm) params.set('q', searchTerm);
  params.set('offset', String(offset));
  params.set('limit', String(PAGE_SIZE));
  return '/api/jobs?' + params.toString();
}

function hideRetry() {
  const box = document.getElementById('retryBox');
  if (box) { box.style.display = 'none'; box.innerHTML = ''; }
}

function showRetry(offset, append) {
  const box = document.getElementById('retryBox');
  if (!box) return;
  const msg = append ? '추가 공고를 불러오지 못했습니다.' : '공고를 불러오지 못했습니다.';
  box.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'retry-box' + (append ? ' inline' : '');
  wrap.setAttribute('role', 'alert');
  const m = document.createElement('span');
  m.className = 'retry-msg';
  m.textContent = msg;
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'retry-btn';
  btn.textContent = '다시 시도';
  btn.addEventListener('click', () => {
    hideRetry();
    loadJobsPage(offset, append);
  });
  wrap.appendChild(m);
  wrap.appendChild(btn);
  box.appendChild(wrap);
  box.style.display = '';
}

async function loadJobsPage(offset, append) {
  if (isLoading) return;
  isLoading = true;
  const mySeq = ++loadReqSeq;
  const indicator = document.getElementById('loadingIndicator');
  if (indicator && append) indicator.style.display = '';
  hideRetry();
  try {
    const r = await fetch(buildJobsUrl(offset));
    if (!r.ok) throw new Error('http ' + r.status);
    const data = await r.json();
    if (mySeq !== loadReqSeq) return;  // stale 응답 무시
    const jobs = data.jobs || [];
    hasMore = !!data.has_more;
    currentOffset = data.next_offset || (offset + jobs.length);
    if (append) {
      appendJobs(jobs);
    } else {
      renderJobs(jobs);
    }
    if (!append && jobs.length === 0) {
      showEmptyState();
    }
  } catch (e) {
    if (mySeq === loadReqSeq) {
      if (!append && !document.querySelector('#jobList .card')) {
        // 최초 로드 실패: 리스트 비우고 안내
        const list = document.getElementById('jobList');
        if (list) list.innerHTML = '';
      }
      showRetry(offset, append);
    }
  } finally {
    if (mySeq === loadReqSeq) isLoading = false;
    if (indicator) indicator.style.display = 'none';
  }
}

function resetAndLoad() {
  currentOffset = 0;
  hasMore = false;
  const list = document.getElementById('jobList');
  if (list) list.innerHTML = '';
  loadJobsPage(0, false);
}

async function loadJobs() {
  // 하위 호환: 기존 호출부(markRead 후/crawl 후/폴링)가 첫 페이지 리로드
  resetAndLoad();
}

function showEmptyState() {
  const list = document.getElementById('jobList');
  if (!list) return;
  const msg = searchTerm ? '검색 결과가 없습니다' : '아직 수집된 공고가 없습니다';
  list.innerHTML = `<div class="empty">${esc(msg)}</div>`;
}

function onSearchInput() {
  const input = document.getElementById('searchInput');
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    const next = (input.value || '').trim();
    if (next === searchTerm) return;
    searchTerm = next;
    syncUrl();
    resetAndLoad();
  }, 300);
}

async function markRead(jobId) {
  if (!LOGGED_IN) return;
  try { await fetch(`/api/jobs/${encodeURIComponent(jobId)}/read`, { method: 'POST' }); } catch (e) {}
  setTimeout(() => { resetAndLoad(); loadStats(); }, 300);
}

async function loadStats() {
  const r = await fetch('/api/stats');
  const d = await r.json();
  document.getElementById('stTotal').textContent = d.total;
  document.getElementById('stNew').textContent = d.new;
  if (LOGGED_IN && d.unread != null) {
    const el = document.getElementById('stUnread');
    if (el) el.textContent = d.unread;
  }
  renderLogs(d.recent_logs);
}

function jobCardHtml(j) {
  return `
    <article class="card ${j.is_new && !j.read ? 'is-new' : ''} ${j.read ? 'read' : ''}" data-job-id="${esc(j.id)}">
      <div class="card-top">
        <div class="src-row">
          ${(j.sources || [{source:j.source,url:j.url,id:j.id}]).map(s => `<span class="src">${esc(s.source)}</span>`).join('')}
          ${j.dup_count > 1 ? `<span class="dup-badge">+${j.dup_count - 1}</span>` : ''}
          ${!j.read && j.is_new ? '<span class="new-badge">NEW</span>' : ''}
        </div>
        ${LOGGED_IN ? `<button class="read-toggle ${j.read ? 'is-read' : ''}" onclick="markRead('${esc(j.id)}')" aria-label="${j.read ? '읽음 처리됨' : '읽음 표시'}">${j.read ? '읽음' : '읽음 표시'}</button>` : ''}
      </div>
      <h3 class="card-title">${esc(j.title)}</h3>
      ${j.org ? `<div class="card-org">${esc(j.org)}</div>` : ''}
      <div class="tags">
        ${j.location ? `<span class="tag loc">${esc(j.location)}</span>` : ''}
        ${j.job_type ? `<span class="tag tp">${esc(j.job_type)}</span>` : ''}
        ${j.deadline ? `<span class="tag dl">마감 ${esc(j.deadline)}</span>` : ''}
      </div>
      <div class="card-btm">
        <span class="card-date">${j.crawled_at ? j.crawled_at.slice(0, 16).replace('T',' ') : ''}</span>
        ${/^https?:\/\//.test(j.url) ? `<a class="card-link" href="${esc(j.url)}" target="_blank" rel="noopener" onclick="markRead('${esc(j.id)}')">공고 보기 →</a>` : `<span class="card-date">링크 없음</span>`}
      </div>
    </article>
  `;
}

function renderJobs(jobs) {
  const el = document.getElementById('jobList');
  if (!jobs.length) {
    showEmptyState();
    return;
  }
  el.innerHTML = jobs.map(jobCardHtml).join('');
}

function appendJobs(jobs) {
  if (!jobs.length) return;
  const el = document.getElementById('jobList');
  // 기존 empty state가 있으면 제거
  const empty = el.querySelector('.empty');
  if (empty) empty.remove();
  const frag = document.createElement('div');
  frag.innerHTML = jobs.map(jobCardHtml).join('');
  while (frag.firstChild) el.appendChild(frag.firstChild);
}

function renderLogs(logs) {
  const el = document.getElementById('logList');
  if (!logs || !logs.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted)">아직 수집 기록이 없습니다</div>'; return; }
  el.innerHTML = logs.map(l => `
    <div class="log-item">
      <span class="log-time">${l.timestamp ? l.timestamp.slice(5, 16).replace('T',' ') : ''}</span>
      <span>${esc(l.source)} · ${l.found}건 중 신규 ${l.new_count}건</span>
      <span class="${l.status === 'ok' ? 'log-ok' : 'log-fail'}" style="margin-left:auto">${l.status === 'ok' ? '성공' : '실패'}</span>
    </div>
  `).join('');
}

function toggleMenu(e){
  e.stopPropagation();
  document.getElementById('menu').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const m = document.getElementById('menu');
  if (m && !m.contains(e.target)) m.classList.remove('open');
});

async function crawlNow() {
  const btn = document.getElementById('crawlBtn');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = '수집 중…';
  msg.textContent = '각 사이트에서 공고를 가져오는 중입니다 (약 30초)';

  try {
    const r = await fetch('/api/crawl_now', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) {
      msg.textContent = `실패: ${d.error || '알 수 없는 오류'}`;
      btn.disabled = false;
      btn.textContent = '수집';
      return;
    }
    msg.textContent = '백그라운드 수집 중 (30~90초)';
    const poll = setInterval(async () => {
      const s = await (await fetch('/api/crawl_status')).json();
      if (!s.running) {
        clearInterval(poll);
        msg.textContent = '수집 완료';
        btn.disabled = false;
        btn.textContent = '수집';
        loadJobs(); loadStats();
        setTimeout(() => { msg.textContent = ''; }, 5000);
      }
    }, 3000);
  } catch (e) {
    msg.textContent = `요청 실패: ${e}`;
    btn.disabled = false;
    btn.textContent = '수집';
  }
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

let subOn = true;
async function toggleSub() {
  const path = subOn ? '/unsubscribe' : '/subscribe';
  const r = await fetch(path, { method: 'POST' });
  if (r.ok) { subOn = !subOn; alert(subOn ? '알림 ON' : '알림 OFF'); }
  else alert('로그인이 필요합니다');
}

setIncludeReadUI();

// IntersectionObserver: sentinel 노출 시 다음 페이지 로드
(function setupInfiniteScroll(){
  const sentinel = document.getElementById('loadMoreSentinel');
  if (!sentinel || !('IntersectionObserver' in window)) return;
  const io = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting && hasMore && !isLoading) {
        loadJobsPage(currentOffset, true);
      }
    }
  }, { rootMargin: '400px 0px' });
  io.observe(sentinel);
})();

// diff-merge 폴링: 새 id만 prepend (스크롤 위치 유지)
async function pollMerge() {
  const list = document.getElementById('jobList');
  if (!list) return;
  // 검색 결과 없음 상태면 skip (혼선 방지)
  if (searchTerm && list.querySelector('.empty')) return;
  // 페이지 내 카드 수 만큼만 조회 (최소 PAGE_SIZE)
  const existingCards = list.querySelectorAll('.card[data-job-id]');
  const existingIds = new Set();
  existingCards.forEach(c => existingIds.add(c.getAttribute('data-job-id')));
  const limit = Math.max(PAGE_SIZE, Math.min(existingCards.length, 200));
  const params = new URLSearchParams();
  if (includeRead) params.set('include_read', '1');
  if (searchTerm) params.set('q', searchTerm);
  params.set('offset', '0');
  params.set('limit', String(limit));
  let data;
  try {
    const r = await fetch('/api/jobs?' + params.toString());
    if (!r.ok) return;
    data = await r.json();
  } catch (e) { return; }
  const jobs = data.jobs || [];
  // 응답 순서대로 신규만 추출
  const fresh = jobs.filter(j => !existingIds.has(j.id));
  if (!fresh.length) return;
  // 첫 카드가 없는 빈 상태(empty)면 일반 렌더 (검색 없음 케이스는 위에서 skip)
  const empty = list.querySelector('.empty');
  if (empty) empty.remove();
  // 응답 상위 순서를 그대로 유지하기 위해 역순 prepend
  const frag = document.createElement('div');
  frag.innerHTML = fresh.map(jobCardHtml).join('');
  const newNodes = Array.from(frag.children);
  newNodes.forEach(n => n.classList.add('merge-in'));
  // 역순으로 insertBefore(first)
  for (let i = newNodes.length - 1; i >= 0; i--) {
    list.insertBefore(newNodes[i], list.firstChild);
  }
}

resetAndLoad();
loadStats();
setInterval(() => {
  if (document.visibilityState === 'visible') { pollMerge(); loadStats(); }
}, 300000);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') { pollMerge(); loadStats(); }
});
</script>
