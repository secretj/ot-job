<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OT 채용 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c12;--s1:#14141e;--s2:#1c1c2a;--bd:#282840;--tx:#e4e4f0;--dm:#7878a0;--ac:#00e09e;--bl:#4d9fff;--pk:#ff5c8a;--or:#ff9f43;--r:12px;--f:'Noto Sans KR',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:16px}

/* header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo sub{font-size:11px;font-weight:400;-webkit-text-fill-color:var(--dm);display:block}
.crawl-btn{padding:10px 20px;background:linear-gradient(135deg,var(--ac),var(--bl));color:var(--bg);border:none;border-radius:var(--r);font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer}
.crawl-btn:disabled{opacity:.5}

/* stats */
.stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;flex:1;min-width:120px}
.stat-label{font-size:11px;color:var(--dm);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:900}
.stat-val.green{color:var(--ac)}.stat-val.blue{color:var(--bl)}.stat-val.pink{color:var(--pk)}

/* filters */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--s1);border:1px solid var(--bd);color:var(--dm);cursor:pointer}
.fbtn.on{background:rgba(0,224,158,.12);border-color:var(--ac);color:var(--ac)}

/* cards */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:.15s}
.card:hover{border-color:var(--ac);background:var(--s2)}
.card.is-new{border-left:3px solid var(--ac)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.src{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.src-사람인{background:#1a2a3a;color:#48f}.src-잡코리아{background:#2a1a2a;color:#f69}.src-Indeed{background:#1a1a2a;color:#6c5ce7}
.src-땡큐오티{background:#1a2a1a;color:#4c8}.src-정신건강OT{background:#2a2a1a;color:#ca4}
.new-badge{font-size:10px;font-weight:700;color:var(--ac);background:rgba(0,224,158,.1);padding:2px 8px;border-radius:4px}
.card-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:4px}
.card-org{font-size:12px;color:var(--dm);margin-bottom:6px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--s2);color:var(--dm)}
.tag.loc{color:var(--bl)}.tag.tp{color:var(--ac)}.tag.dl{color:var(--or)}
.card-btm{display:flex;justify-content:space-between;align-items:center}
.card-date{font-size:10px;color:var(--dm)}
.card-link{font-size:12px;font-weight:700;color:var(--ac);text-decoration:none;padding:6px 12px;border-radius:8px;background:rgba(0,224,158,.08);border:1px solid rgba(0,224,158,.2)}
.card-link:hover{background:rgba(0,224,158,.2)}

/* log */
.log-section{margin-top:24px}
.log-title{font-size:14px;font-weight:700;margin-bottom:10px}
.log-item{font-size:11px;color:var(--dm);padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-time{color:var(--bl)}

.empty{text-align:center;padding:60px;color:var(--dm)}
.status-msg{font-size:12px;color:var(--ac);margin-top:8px;text-align:center;min-height:18px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .25s ease both}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">OT JOB TRACKER<sub>서울 · 작업치료 · 감각통합</sub></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="crawl-btn" id="crawlBtn" onclick="crawlNow()">🔍 지금 수집</button>
      {% if me %}
        <span style="font-size:12px;color:var(--dm)">👤 {{ me.nickname or me.id }}</span>
        <button class="crawl-btn" onclick="toggleSub()">알림 토글</button>
        <a class="crawl-btn" style="text-decoration:none;display:inline-block" href="/logout">로그아웃</a>
      {% else %}
        <a class="crawl-btn" style="text-decoration:none" href="/login">카카오로 로그인</a>
      {% endif %}
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">전체 공고</div><div class="stat-val green" id="stTotal">-</div></div>
    <div class="stat"><div class="stat-label">신규 (NEW)</div><div class="stat-val pink" id="stNew">-</div></div>
    <div class="stat"><div class="stat-label">정규직</div><div class="stat-val blue" id="stFull">-</div></div>
  </div>

  <div class="filters">
    <div class="fbtn on" data-f="" onclick="setFilter('')">전체</div>
    <div class="fbtn" data-f="정규직" onclick="setFilter('정규직')">정규직</div>
    <div class="fbtn" data-f="작업치료" onclick="setFilter('작업치료')">작업치료</div>
    <div class="fbtn" data-f="감각통합" onclick="setFilter('감각통합')">감각통합</div>
    <div class="fbtn" data-f="서울" onclick="setFilter('서울')">서울만</div>
  </div>

  <div class="status-msg" id="statusMsg"></div>
  <div id="jobList"><div class="empty">🔍 수집 버튼을 누르거나 잠시 기다려주세요</div></div>

  <div class="log-section">
    <div class="log-title">📊 수집 로그</div>
    <div id="logList"></div>
  </div>
</div>

<script>
let currentFilter = '';

async function loadJobs() {
  const params = new URLSearchParams();
  if (currentFilter) params.set('keyword', currentFilter);
  const r = await fetch('/api/jobs?' + params);
  const jobs = await r.json();
  renderJobs(jobs);
}

async function loadStats() {
  const r = await fetch('/api/stats');
  const d = await r.json();
  document.getElementById('stTotal').textContent = d.total;
  document.getElementById('stNew').textContent = d.new;
  document.getElementById('stFull').textContent = d.fulltime;
  renderLogs(d.recent_logs);
}

function renderJobs(jobs) {
  const el = document.getElementById('jobList');
  if (!jobs.length) {
    el.innerHTML = '<div class="empty">📂 해당 조건의 공고가 없습니다</div>';
    return;
  }
  el.innerHTML = jobs.map((j, i) => `
    <div class="card ${j.is_new ? 'is-new' : ''}" style="animation-delay:${i * 0.03}s">
      <div class="card-top">
        <span class="src src-${j.source}">${j.source}</span>
        ${j.is_new ? '<span class="new-badge">NEW</span>' : ''}
      </div>
      <div class="card-title">${esc(j.title)}</div>
      ${j.org ? `<div class="card-org">🏥 ${esc(j.org)}</div>` : ''}
      <div class="tags">
        ${j.location ? `<span class="tag loc">📍 ${esc(j.location)}</span>` : ''}
        ${j.job_type ? `<span class="tag tp">💼 ${esc(j.job_type)}</span>` : ''}
        ${j.deadline ? `<span class="tag dl">⏰ ${esc(j.deadline)}</span>` : ''}
      </div>
      <div class="card-btm">
        <span class="card-date">${j.crawled_at ? j.crawled_at.slice(0, 16) : ''}</span>
        ${/^https?:\/\//.test(j.url) ? `<a class="card-link" href="${esc(j.url)}" target="_blank" rel="noopener">공고 보기 →</a>` : `<span class="card-date">🔗 링크 없음</span>`}
      </div>
    </div>
  `).join('');
}

function renderLogs(logs) {
  const el = document.getElementById('logList');
  if (!logs || !logs.length) { el.innerHTML = '<div style="font-size:12px;color:var(--dm)">아직 수집 기록 없음</div>'; return; }
  el.innerHTML = logs.map(l => `
    <div class="log-item">
      <span class="log-time">${l.timestamp ? l.timestamp.slice(5, 16) : ''}</span>
      [${l.source}] 수집 ${l.found}건, 신규 ${l.new_count}건 ${l.status === 'ok' ? '✅' : '❌'}
    </div>
  `).join('');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('on', (b.dataset.f || '') === f));
  loadJobs();
}

async function crawlNow() {
  const btn = document.getElementById('crawlBtn');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = '⏳ 수집 중...';
  msg.textContent = '각 채용 사이트에서 공고를 수집하고 있어요 (약 30초)';

  try {
    const r = await fetch('/api/crawl_now', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) {
      msg.textContent = `⚠️ ${d.error || '실패'}`;
      btn.disabled = false;
      btn.textContent = '🔍 지금 수집';
      return;
    }
    msg.textContent = '⏳ 백그라운드 수집 중... (30~90초)';
    const poll = setInterval(async () => {
      const s = await (await fetch('/api/crawl_status')).json();
      if (!s.running) {
        clearInterval(poll);
        msg.textContent = '✅ 수집 완료';
        btn.disabled = false;
        btn.textContent = '🔍 지금 수집';
        loadJobs(); loadStats();
        setTimeout(() => { msg.textContent = ''; }, 5000);
      }
    }, 3000);
  } catch (e) {
    msg.textContent = `❌ 요청 실패: ${e}`;
    btn.disabled = false;
    btn.textContent = '🔍 지금 수집';
  }
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

let subOn = true;
async function toggleSub() {
  const path = subOn ? '/unsubscribe' : '/subscribe';
  const r = await fetch(path, { method: 'POST' });
  if (r.ok) { subOn = !subOn; alert(subOn ? '알림 ON' : '알림 OFF'); }
  else alert('로그인 필요');
}

// 초기 로드
loadJobs();
loadStats();

// 30초마다 새로고침
setInterval(() => { loadJobs(); loadStats(); }, 30000);
</script>
</body>
</html>
